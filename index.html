    <script>

    <style>
        ::selection{background:#D4A017;color:#000}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:#111}
        ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:#D4A017}
        .reveal{opacity:0;transform:translateY(30px);transition:all .8s cubic-bezier(.16,1,.3,1)}
        .reveal.active{opacity:1;transform:translateY(0)}
        @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
        @keyframes fade-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pop-in{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
        @keyframes img-rotate{0%{transform:perspective(800px) rotateY(-12deg) rotateX(2deg) scale(1)}25%{transform:perspective(800px) rotateY(8deg) rotateX(-1deg) scale(1.03)}50%{transform:perspective(800px) rotateY(12deg) rotateX(2deg) scale(1.05)}75%{transform:perspective(800px) rotateY(-4deg) rotateX(-1deg) scale(1.02)}100%{transform:perspective(800px) rotateY(-12deg) rotateX(2deg) scale(1)}}
        @keyframes lightbox-in{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
        @keyframes lb-fade-out{to{opacity:0;pointer-events:none}}
        @keyframes lightbox-spin{0%{transform:perspective(1000px) rotateY(0deg)}100%{transform:perspective(1000px) rotateY(360deg)}}
        @keyframes live-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
        @keyframes live-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}
        @keyframes glow-line{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
        @keyframes slide-up-in{from{transform:translateY(100%) scale(.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
        @keyframes typing-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
        @keyframes float-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes pulse-ring{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
        @keyframes agent-pop{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.1) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
        @keyframes success-bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes discount-glow{0%,100%{box-shadow:0 0 10px rgba(34,197,94,.3)}50%{box-shadow:0 0 20px rgba(34,197,94,.6)}}
        @keyframes toast-in{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toast-out{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
        @keyframes logo-spin{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
        @keyframes logo-glow{0%,100%{filter:brightness(1.1) contrast(1.05) drop-shadow(0 0 6px rgba(212,160,23,0.15))}50%{filter:brightness(1.2) contrast(1.1) drop-shadow(0 0 14px rgba(212,160,23,0.35))}}

        .shimmer-text{background:linear-gradient(90deg,#D4A017 0%,#FDE68A 50%,#D4A017 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
        .product-card{transition:all .5s cubic-bezier(.16,1,.3,1)}
        .product-card:hover{transform:translateY(-8px)}
        .img-rotator{animation:img-rotate 8s ease-in-out infinite;transform-origin:center center;cursor:pointer;transition:filter .3s}
        .product-card:hover .img-rotator{animation-duration:4s;filter:brightness(1.1) contrast(1.05)}
        .cat-btn{transition:all .3s ease}
        .cat-btn.active-cat{background:#D4A017!important;color:#000!important;border-color:#D4A017!important}
        body.owner-mode .user-only{display:none!important}
        body:not(.owner-mode) .owner-only{display:none!important}
        .form-input{transition:border-color .3s ease,box-shadow .3s ease}
        .form-input:focus{border-color:#D4A017!important;box-shadow:0 0 0 3px rgba(212,160,23,.1)}
        .form-input.error{border-color:#ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.1)}
        .inline-err{color:#f87171;font-size:11px;margin-top:4px;display:none}
        .inline-err.show{display:block}
        .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

        .lightbox-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
        .lightbox-overlay.active{opacity:1;pointer-events:all}
        .lightbox-overlay.closing{animation:lb-fade-out .25s ease-out forwards}
        .lightbox-img-wrap{position:relative;max-width:92vw;max-height:78vh;display:flex;align-items:center;justify-content:center;flex:1;width:100%;padding:60px 12px 60px}
        .lightbox-img{max-width:100%;max-height:100%;object-fit:contain;border-radius:12px;box-shadow:0 25px 80px rgba(0,0,0,.6),0 0 40px rgba(212,160,23,.1);animation:lightbox-in .4s cubic-bezier(.16,1,.3,1) forwards;user-select:none;-webkit-user-drag:none}
        .lightbox-img.auto-spinning{animation:lightbox-spin 12s linear infinite}
        .lb-close-btn{position:fixed;top:12px;right:12px;z-index:202;width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(0,0,0,.7);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;transition:all .2s}
        .lb-close-btn:hover,.lb-close-btn:active{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.15);transform:scale(1.1)}
        .lb-info{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:202;text-align:center;max-width:75vw;pointer-events:none}
        .lb-info .lb-name{font-weight:800;font-size:15px;text-shadow:0 2px 12px rgba(0,0,0,.8);line-height:1.3}
        .lb-info .lb-price{color:#D4A017;font-weight:700;font-size:13px;margin-top:2px;text-shadow:0 2px 12px rgba(0,0,0,.8)}
        .lb-controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:202;display:flex;gap:12px}
        .lb-ctrl-btn{width:46px;height:46px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);background:rgba(0,0,0,.6);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;transition:all .2s}
        .lb-ctrl-btn:hover,.lb-ctrl-btn:active{border-color:#D4A017;color:#D4A017;background:rgba(212,160,23,.1)}
        .lb-ctrl-btn.spin-active{border-color:#D4A017;color:#D4A017;background:rgba(212,160,23,.15)}
        .lb-tap-close{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);z-index:202;color:rgba(255,255,255,.3);font-size:11px;font-weight:600;letter-spacing:.05em;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.5)}
        .click-hint{position:absolute;bottom:50%;left:50%;transform:translate(-50%,50%);background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:6px 14px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.8);opacity:0;transition:opacity .3s;pointer-events:none}
        .product-card:hover .click-hint{opacity:1}
